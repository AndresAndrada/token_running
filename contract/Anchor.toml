[toolchain]
package_manager = "yarn"
anchor_version = "0.30.1"

[features]
resolution = true
skip-lint = false

[programs.localnet]
list_contract = "7QcpGHW5VfPe2U2SoSqQhQmtqVMD1FLBeGxLLT2DxWpj"

[programs.devnet]
list_contract = "2NszZaqQu9zn6u51ionxw4MwiRURSaZ1px3bKrds8VAS"

[registry]
url = "https://api.apr.dev"


# localnet or devnet
[provider]
cluster = "devnet"
wallet = "./phantom-admin.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
initialize = "yarn ts-node scripts/initialize.ts"
read_state = "yarn ts-node scripts/read_state.ts"
show-admin = "yarn ts-node scripts/show-admin.ts"
getPDA = "yarn ts-node scripts/getPDA.ts"
getMintAuthorityKey = "yarn ts-node scripts/getMintAuthorityKey.ts"