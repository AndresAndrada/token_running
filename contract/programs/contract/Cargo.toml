[package]
name = "list_contract"
version = "0.1.0"
description = "Created with Anchor"
edition = "2021"

[lib]
crate-type = ["cdylib", "lib"]
name = "list_contract"

[features]
default = []
cpi = ["no-entrypoint"]
no-entrypoint = []
no-idl = []
no-log-ix-name = []
idl-build = ["anchor-lang/idl-build", "anchor-spl/idl-build"]

[dependencies]
# Enable `init-if-needed` feature required by the `#[account(init_if_needed)]` attribute
anchor-lang = { version = "0.32.1", features = ["init-if-needed"] }
anchor-spl = "0.32.1"
borsh = "0.10.3"

[profile.release]
# Ensure compatibility with Solana's pinned toolchain
lto = "fat"
codegen-units = 1
